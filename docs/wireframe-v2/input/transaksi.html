<!doctype html>
<html lang="id" data-theme="wireframe">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1.0" />
		<title>Wireframe · Transaksi</title>
		<link rel="stylesheet" href="../dist/style.css" />
	</head>
	<body class="min-h-dvh bg-base-200">
		<div class="mx-auto max-w-6xl p-4">
			<h1 class="mb-1 text-2xl font-bold">💳 Transaksi</h1>
			<p class="mb-4 text-sm opacity-60">Daftar transaksi pembayaran</p>
			<div class="card mb-4 border border-base-300 bg-base-100 p-4 shadow-sm">
				<div class="flex flex-wrap items-end gap-4">
					<div class="flex items-center gap-2">
						<label class="wf-label">📅 Pilih Periode</label
						><input
							type="month"
							class="input w-36 input-sm"
							value="2026-01"
							disabled
						/><span class="text-sm">Sampai:</span
						><input
							type="month"
							class="input w-36 input-sm"
							value="2026-03"
							disabled
						/>
					</div>
					<div class="ml-auto flex items-center gap-2">
						<button class="btn btn-sm">🔽 Filter</button
						><label class="input input-sm"
							>🔍<input
								type="search"
								placeholder="Cari transaksi…"
								class="grow"
						/></label>
					</div>
				</div>
			</div>
			<div
				class="stats mb-4 w-full stats-vertical border border-base-300 shadow-sm sm:stats-horizontal"
			>
				<div class="stat">
					<div class="stat-title">Total Tagihan</div>
					<div class="stat-value text-xl">
						<span class="inline-block w-16 skeleton">&nbsp;</span>
					</div>
					<div class="stat-desc">
						<span class="inline-block w-12 skeleton">&nbsp;</span> invoice
					</div>
				</div>
				<div class="stat">
					<div class="stat-title">Lunas</div>
					<div class="stat-value text-xl">
						<span class="inline-block w-12 skeleton">&nbsp;</span>
					</div>
				</div>
				<div class="stat">
					<div class="stat-title">Belum Lunas</div>
					<div class="stat-value text-xl">
						<span class="inline-block w-12 skeleton">&nbsp;</span>
					</div>
				</div>
				<div class="stat">
					<div class="stat-title">Tertunggak</div>
					<div class="stat-value text-xl">
						<span class="inline-block w-12 skeleton">&nbsp;</span>
					</div>
					<div class="stat-desc text-error">⚠️ Perlu perhatian</div>
				</div>
			</div>
			<div class="overflow-x-auto rounded-box border border-base-300 shadow-sm">
				<table class="table table-sm">
					<thead>
						<tr>
							<th>No. Invoice</th>
							<th>Penghuni</th>
							<th>Kamar</th>
							<th class="text-right">Nominal</th>
							<th>Jatuh Tempo</th>
							<th>Status</th>
							<th>Ref. Gateway</th>
						</tr>
					</thead>
					<tbody>
						<tr>
							<td><span class="inline-block w-28 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-24 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-8 skeleton">&nbsp;</span></td>
							<td class="text-right">
								<span class="inline-block w-16 skeleton">&nbsp;</span>
							</td>
							<td><span class="inline-block w-20 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-16 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-14 skeleton">&nbsp;</span></td>
						</tr>
						<tr>
							<td><span class="inline-block w-28 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-24 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-8 skeleton">&nbsp;</span></td>
							<td class="text-right">
								<span class="inline-block w-16 skeleton">&nbsp;</span>
							</td>
							<td><span class="inline-block w-20 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-16 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-14 skeleton">&nbsp;</span></td>
						</tr>
						<tr>
							<td><span class="inline-block w-28 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-24 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-8 skeleton">&nbsp;</span></td>
							<td class="text-right">
								<span class="inline-block w-16 skeleton">&nbsp;</span>
							</td>
							<td><span class="inline-block w-20 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-16 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-14 skeleton">&nbsp;</span></td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>
	</body>
</html>
