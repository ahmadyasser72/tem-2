<!doctype html>
<html lang="id" data-theme="wireframe">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1.0" />
		<title>Wireframe · Akun</title>
		<link rel="stylesheet" href="../dist/style.css" />
	</head>
	<body class="min-h-dvh bg-base-200">
		<div class="mx-auto max-w-6xl p-4">
			<h1 class="mb-1 text-2xl font-bold">🔑 Akun</h1>
			<p class="mb-4 text-sm opacity-60">Kelola akun pengguna sistem</p>
			<div class="mb-4 flex items-center justify-between">
				<button class="btn btn-primary btn-sm">+ Tambah Akun</button>
				<div class="flex items-center justify-end gap-2">
					<button class="btn btn-sm">🔽 Filter</button
					><label class="input input-sm"
						>🔍<input type="search" placeholder="Cari akun…" class="grow"
					/></label>
				</div>
			</div>
			<div
				class="stats mb-4 w-full stats-vertical border border-base-300 shadow-sm sm:stats-horizontal"
			>
				<div class="stat">
					<div class="stat-title">Total Akun</div>
					<div class="stat-value text-xl">
						<span class="inline-block w-8 skeleton">&nbsp;</span>
					</div>
				</div>
				<div class="stat">
					<div class="stat-title">Aktif</div>
					<div class="stat-value text-xl">
						<span class="inline-block w-6 skeleton">&nbsp;</span>
					</div>
				</div>
				<div class="stat">
					<div class="stat-title">Nonaktif</div>
					<div class="stat-value text-xl">
						<span class="inline-block w-6 skeleton">&nbsp;</span>
					</div>
				</div>
				<div class="stat">
					<div class="stat-title">Admin</div>
					<div class="stat-value text-xl">
						<span class="inline-block w-6 skeleton">&nbsp;</span>
					</div>
				</div>
			</div>
			<div class="overflow-x-auto rounded-box border border-base-300 shadow-sm">
				<table class="table table-sm">
					<thead>
						<tr>
							<th>Nama Pengguna</th>
							<th>Email</th>
							<th>Role</th>
							<th>Terakhir Login</th>
							<th>Status</th>
							<th class="text-right">Aksi</th>
						</tr>
					</thead>
					<tbody>
						<tr>
							<td><span class="inline-block w-28 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-36 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-14 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-28 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-14 skeleton">&nbsp;</span></td>
							<td class="text-right">
								<span class="inline-block w-8 skeleton">&nbsp;</span>
							</td>
						</tr>
						<tr>
							<td><span class="inline-block w-28 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-36 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-14 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-28 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-14 skeleton">&nbsp;</span></td>
							<td class="text-right">
								<span class="inline-block w-8 skeleton">&nbsp;</span>
							</td>
						</tr>
						<tr>
							<td><span class="inline-block w-28 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-36 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-14 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-28 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-14 skeleton">&nbsp;</span></td>
							<td class="text-right">
								<span class="inline-block w-8 skeleton">&nbsp;</span>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>
	</body>
</html>
