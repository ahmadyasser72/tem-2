<!doctype html>
<html lang="id" data-theme="wireframe">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1.0" />
		<title>Wireframe · Akun</title>
		<link rel="stylesheet" href="../dist/style.css" />
	</head>
	<body class="min-h-dvh bg-base-200">
		<div class="mx-auto max-w-6xl p-4">
			<div class="mb-4 flex items-start justify-between">
				<div>
					<h1 class="mb-1 text-2xl font-bold">🔑 Akun</h1>
					<p class="text-sm opacity-60">Kelola akun pengguna sistem</p>
				</div>
				<div class="flex items-center gap-2">
					<button class="btn btn-primary btn-sm">+ Tambah</button>
				</div>
			</div>
			<div class="card mb-4 border border-base-300 bg-base-100 shadow-sm">
				<div class="p-4">
					<div class="flex flex-wrap items-center gap-2">
						<button class="btn btn-sm">🔽 Filter</button>
						<label class="input input-sm"
							>🔍 <input type="search" placeholder="Cari akun…" class="grow"
						/></label>
					</div>
				</div>
			</div>
			<div
				class="stats mb-4 w-full stats-vertical border border-base-300 shadow-sm sm:stats-horizontal"
			>
				<div class="stat">
					<div class="stat-title">Total Akun</div>
					<div class="stat-value text-xl">
						<span class="inline-block w-8 skeleton">&nbsp;</span>
					</div>
				</div>
				<div class="stat">
					<div class="stat-title">Aktif</div>
					<div class="stat-value text-xl">
						<span class="inline-block w-6 skeleton">&nbsp;</span>
					</div>
				</div>
				<div class="stat">
					<div class="stat-title">Nonaktif</div>
					<div class="stat-value text-xl">
						<span class="inline-block w-6 skeleton">&nbsp;</span>
					</div>
				</div>
				<div class="stat">
					<div class="stat-title">Admin</div>
					<div class="stat-value text-xl">
						<span class="inline-block w-6 skeleton">&nbsp;</span>
					</div>
				</div>
			</div>
			<div class="overflow-x-auto border border-base-300 shadow-sm">
				<table class="table table-sm">
					<thead>
						<tr>
							<th>Nama</th>
							<th>Email/HP</th>
							<th>Role</th>
							<th>Terakhir Login</th>
							<th>Status</th>
							<th></th>
						</tr>
					</thead>
					<tbody>
						<tr>
							<td><span class="inline-block w-24 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-28 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-12 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-14 skeleton">&nbsp;</span></td>
							<td><span class="badge w-14 skeleton badge-sm">&nbsp;</span></td>
							<td class="text-right">
								<span class="inline-block w-8 skeleton">&nbsp;</span>
							</td>
						</tr>
						<tr>
							<td><span class="inline-block w-28 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-36 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-14 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-14 skeleton">&nbsp;</span></td>
							<td><span class="badge w-12 skeleton badge-sm">&nbsp;</span></td>
							<td class="text-right">
								<span class="inline-block w-8 skeleton">&nbsp;</span>
							</td>
						</tr>
						<tr>
							<td><span class="inline-block w-20 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-32 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-10 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-14 skeleton">&nbsp;</span></td>
							<td><span class="badge w-16 skeleton badge-sm">&nbsp;</span></td>
							<td class="text-right">
								<span class="inline-block w-8 skeleton">&nbsp;</span>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
			<div class="mt-4 flex items-center justify-between">
				<span class="text-sm opacity-60"
					>Menampilkan 1-3 dari
					<span class="inline-block w-6 skeleton">&nbsp;</span></span
				>
				<div class="join">
					<button class="btn join-item btn-sm">«</button>
					<button class="btn btn-active join-item btn-sm">1</button>
					<button class="btn join-item btn-sm">2</button>
					<button class="btn join-item btn-sm">3</button>
					<button class="btn join-item btn-sm">»</button>
				</div>
			</div>
		</div>
	</body>
</html>
