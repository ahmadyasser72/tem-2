<!doctype html>
<html lang="id" data-theme="wireframe">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1.0" />
		<title>Wireframe · Akun</title>
		<link rel="stylesheet" href="../dist/style.css" />
	</head>
	<body class="min-h-dvh bg-base-200">
		<div class="mx-auto max-w-6xl p-4">
			<div class="mb-4 flex items-start justify-between">
				<div>
					<h1 class="mb-1 text-2xl font-bold">🔑 Akun</h1>
					<p class="text-sm opacity-60">Kelola akun pengguna sistem</p>
				</div>
				<div class="flex items-center gap-2">
					<button class="btn btn-primary btn-sm">+ Tambah</button>
				</div>
			</div>
			<div class="card mb-4 border border-base-300 bg-base-100 shadow-sm">
				<div class="p-4">
					<div class="flex flex-wrap items-center justify-end gap-2">
						<button class="btn btn-sm">🔽 Filter</button>
						<label class="input input-sm"
							>🔍 <input type="search" placeholder="Cari akun…" class="grow"
						/></label>
					</div>
				</div>
			</div>
			<div class="overflow-x-auto border border-base-300 shadow-sm">
				<table class="table table-sm">
					<thead>
						<tr>
							<th class="w-8">#</th>
							<th>Username</th>
							<th>Role</th>
							<th>Terakhir Akses</th>
							<th class="text-right">Aksi</th>
						</tr>
					</thead>
					<tbody>
						<tr>
							<td class="font-mono">
								<span class="inline-block w-4 skeleton">&nbsp;</span>
							</td>
							<td class="flex items-center gap-2 font-semibold">
								<div class="avatar avatar-placeholder">
									<div class="w-8 skeleton rounded-full">&nbsp;</div>
								</div>
								<span class="inline-block w-24 skeleton">&nbsp;</span>
							</td>
							<td><span class="badge w-12 skeleton badge-sm">&nbsp;</span></td>
							<td><span class="inline-block w-24 skeleton">&nbsp;</span></td>
							<td class="text-right">
								<span class="inline-block w-8 skeleton">&nbsp;</span>
							</td>
						</tr>
						<tr>
							<td class="font-mono">
								<span class="inline-block w-4 skeleton">&nbsp;</span>
							</td>
							<td class="flex items-center gap-2 font-semibold">
								<div class="avatar avatar-placeholder">
									<div class="w-8 skeleton rounded-full">&nbsp;</div>
								</div>
								<span class="inline-block w-32 skeleton">&nbsp;</span>
							</td>
							<td><span class="badge w-12 skeleton badge-sm">&nbsp;</span></td>
							<td><span class="inline-block w-24 skeleton">&nbsp;</span></td>
							<td class="text-right">
								<span class="inline-block w-8 skeleton">&nbsp;</span>
							</td>
						</tr>
						<tr>
							<td class="font-mono">
								<span class="inline-block w-4 skeleton">&nbsp;</span>
							</td>
							<td class="flex items-center gap-2 font-semibold">
								<div class="avatar avatar-placeholder">
									<div class="w-8 skeleton rounded-full">&nbsp;</div>
								</div>
								<span class="inline-block w-20 skeleton">&nbsp;</span>
							</td>
							<td><span class="badge w-12 skeleton badge-sm">&nbsp;</span></td>
							<td><span class="inline-block w-24 skeleton">&nbsp;</span></td>
							<td class="text-right">
								<span class="inline-block w-8 skeleton">&nbsp;</span>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>
	</body>
</html>
