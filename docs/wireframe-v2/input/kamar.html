<!doctype html>
<html lang="id" data-theme="wireframe">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1.0" />
		<title>Wireframe · Kamar</title>
		<link rel="stylesheet" href="../dist/style.css" />
	</head>
	<body class="min-h-dvh bg-base-200">
		<div class="mx-auto max-w-6xl p-4">
			<h1 class="mb-1 text-2xl font-bold">🚪 Kamar</h1>
			<p class="mb-4 text-sm opacity-60">Kelola data kamar kos</p>
			<div class="mb-4 flex items-center justify-between">
				<div class="flex gap-2">
					<button class="btn btn-outline btn-sm">📄 PDF</button
					><button class="btn btn-primary btn-sm">+ Tambah Kamar</button>
				</div>
				<div class="flex items-center justify-end gap-2">
					<button class="btn btn-sm">🔽 Filter</button
					><label class="input input-sm"
						>🔍<input type="search" placeholder="Cari kamar…" class="grow"
					/></label>
				</div>
			</div>
			<div
				class="stats mb-4 w-full stats-vertical border border-base-300 shadow-sm sm:stats-horizontal"
			>
				<div class="stat">
					<div class="stat-title">Total Kamar</div>
					<div class="stat-value text-xl">
						<span class="inline-block w-8 skeleton">&nbsp;</span>
					</div>
				</div>
				<div class="stat">
					<div class="stat-title">Terisi</div>
					<div class="stat-value text-xl">
						<span class="inline-block w-6 skeleton">&nbsp;</span>
					</div>
				</div>
				<div class="stat">
					<div class="stat-title">Kosong</div>
					<div class="stat-value text-xl">
						<span class="inline-block w-6 skeleton">&nbsp;</span>
					</div>
				</div>
				<div class="stat">
					<div class="stat-title">Nonaktif</div>
					<div class="stat-value text-xl">
						<span class="inline-block w-6 skeleton">&nbsp;</span>
					</div>
				</div>
			</div>
			<div class="overflow-x-auto rounded-box border border-base-300 shadow-sm">
				<table class="table table-sm">
					<thead>
						<tr>
							<th>No. Kamar</th>
							<th>Jenis</th>
							<th class="text-right">Harga/Bulan</th>
							<th>Status</th>
							<th>Penghuni</th>
							<th>Akhir Sewa</th>
							<th class="text-right">Aksi</th>
						</tr>
					</thead>
					<tbody>
						<tr>
							<td><span class="inline-block w-10 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-14 skeleton">&nbsp;</span></td>
							<td class="text-right">
								<span class="inline-block w-16 skeleton">&nbsp;</span>
							</td>
							<td><span class="inline-block w-16 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-24 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-20 skeleton">&nbsp;</span></td>
							<td class="text-right">
								<span class="inline-block w-8 skeleton">&nbsp;</span>
							</td>
						</tr>
						<tr>
							<td><span class="inline-block w-10 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-14 skeleton">&nbsp;</span></td>
							<td class="text-right">
								<span class="inline-block w-16 skeleton">&nbsp;</span>
							</td>
							<td><span class="inline-block w-16 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-24 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-20 skeleton">&nbsp;</span></td>
							<td class="text-right">
								<span class="inline-block w-8 skeleton">&nbsp;</span>
							</td>
						</tr>
						<tr>
							<td><span class="inline-block w-10 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-14 skeleton">&nbsp;</span></td>
							<td class="text-right">
								<span class="inline-block w-16 skeleton">&nbsp;</span>
							</td>
							<td><span class="inline-block w-16 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-24 skeleton">&nbsp;</span></td>
							<td><span class="inline-block w-20 skeleton">&nbsp;</span></td>
							<td class="text-right">
								<span class="inline-block w-8 skeleton">&nbsp;</span>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
			<div class="mt-3 flex items-center justify-between">
				<span class="text-sm opacity-60"
					>Menampilkan 1-3 dari
					<span class="inline-block w-6 skeleton">&nbsp;</span></span
				>
				<div class="join">
					<button class="btn join-item btn-sm">«</button
					><button class="btn btn-active join-item btn-sm">1</button
					><button class="btn join-item btn-sm">2</button
					><button class="btn join-item btn-sm">»</button>
				</div>
			</div>
		</div>
	</body>
</html>
