<!doctype html>
<html lang="id" data-theme="wireframe">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1.0" />
		<title>Wireframe · Log Chatbot</title>
		<link rel="stylesheet" href="../dist/style.css" />
	</head>
	<body class="min-h-dvh bg-base-200">
		<div class="mx-auto max-w-6xl p-4">
			<div class="mb-4 flex items-start justify-between">
				<div>
					<h1 class="mb-1 text-2xl font-bold">🤖 Log Chatbot</h1>
					<p class="text-sm opacity-60">
						Riwayat percakapan chatbot dengan penghuni
					</p>
				</div>
				<div class="flex items-center gap-2">
					<button class="btn btn-outline btn-sm">📄 PDF</button>
				</div>
			</div>
			<div class="card mb-4 border border-base-300 bg-base-100 shadow-sm">
				<div class="p-4">
					<div
						class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between"
					>
						<label class="input w-full input-sm sm:w-64">
							📅
							<input
								type="text"
								class="vc grow"
								placeholder="Pilih periode"
								readonly
							/>
						</label>
						<div class="flex items-center gap-2">
							<button class="btn btn-sm">🔽 Filter</button>
							<label class="input input-sm"
								>🔍 <input type="search" placeholder="Cari…" class="grow"
							/></label>
						</div>
					</div>
				</div>
			</div>
			<div
				class="stats mb-4 w-full stats-vertical border border-base-300 shadow-sm sm:stats-horizontal"
			>
				<div class="stat">
					<div class="stat-title">Total Percakapan</div>
					<div class="stat-value text-xl">
						<span class="inline-block w-8 skeleton">&nbsp;</span>
					</div>
				</div>
				<div class="stat">
					<div class="stat-title">Pesan Masuk</div>
					<div class="stat-value text-xl">
						<span class="inline-block w-6 skeleton">&nbsp;</span>
					</div>
				</div>
				<div class="stat">
					<div class="stat-title">Pesan Keluar</div>
					<div class="stat-value text-xl">
						<span class="inline-block w-6 skeleton">&nbsp;</span>
					</div>
				</div>
			</div>
			<div class="overflow-x-auto border border-base-300 shadow-sm">
				<table class="table table-sm">
					<thead>
						<tr>
							<th class="w-48">Terkirim</th>
							<th>Penghuni</th>
							<th>Arah</th>
							<th class="text-right">Aksi</th>
						</tr>
					</thead>
					<tbody>
						<tr>
							<td>
								<span class="inline-block w-28 skeleton font-mono">&nbsp;</span>
							</td>
							<td><span class="inline-block w-20 skeleton">&nbsp;</span></td>
							<td><span class="badge w-14 skeleton badge-sm">&nbsp;</span></td>
							<td class="text-right">
								<span class="inline-block w-8 skeleton">&nbsp;</span>
							</td>
						</tr>
						<tr>
							<td>
								<span class="inline-block w-28 skeleton font-mono">&nbsp;</span>
							</td>
							<td><span class="inline-block w-24 skeleton">&nbsp;</span></td>
							<td><span class="badge w-12 skeleton badge-sm">&nbsp;</span></td>
							<td class="text-right">
								<span class="inline-block w-8 skeleton">&nbsp;</span>
							</td>
						</tr>
						<tr>
							<td>
								<span class="inline-block w-28 skeleton font-mono">&nbsp;</span>
							</td>
							<td><span class="inline-block w-18 skeleton">&nbsp;</span></td>
							<td><span class="badge w-16 skeleton badge-sm">&nbsp;</span></td>
							<td class="text-right">
								<span class="inline-block w-8 skeleton">&nbsp;</span>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>
	</body>
</html>
