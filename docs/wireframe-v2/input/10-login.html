<!doctype html>
<html lang="id" data-theme="wireframe">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1.0" />
		<title>Wireframe · Login</title>
		<link rel="stylesheet" href="../dist/style.css" />
	</head>
	<body class="grid min-h-screen place-items-center bg-base-200 p-4">
		<div class="card w-96 bg-base-100 shadow-xl">
			<div class="card-body">
				<div class="text-center">
					<svg
						class="mx-auto text-purple-600"
						width="96"
						height="96"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="1.5"
						stroke-linecap="round"
						stroke-linejoin="round"
						xmlns="http://www.w3.org/2000/svg"
					>
						<path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8" />
						<path
							d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"
						/>
					</svg>
					<h1 class="mt-2 text-2xl font-bold">Indekos Ungu</h1>
					<p class="text-sm opacity-50">Sistem Manajemen Indekos</p>
				</div>
				<form class="contents">
					<fieldset class="fieldset">
						<legend class="fieldset-legend">Nama Pengguna</legend>
						<input
							class="input w-full"
							type="text"
							placeholder="Masukkan username"
							disabled
						/>
					</fieldset>
					<fieldset class="fieldset">
						<legend class="fieldset-legend">Kata Sandi</legend>
						<input
							class="input w-full"
							type="password"
							placeholder="Masukkan password"
							disabled
						/>
					</fieldset>
					<button class="btn mt-2 w-full btn-primary" disabled>Masuk</button>
				</form>
			</div>
		</div>
	</body>
</html>
