<!doctype html>
<html lang="id" data-theme="wireframe">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1.0" />
		<title>Wireframe · Dashboard</title>
		<link rel="stylesheet" href="../dist/style.css" />
	</head>
	<body class="min-h-dvh bg-base-200">
		<div class="mx-auto max-w-6xl p-4">
			<h1 class="mb-1 text-2xl font-bold">📊 Dashboard</h1>
			<p class="mb-4 text-sm opacity-60">Ringkasan kondisi kos</p>
			<div
				class="stats mb-6 w-full stats-vertical border border-base-300 shadow-sm sm:stats-horizontal"
			>
				<div class="stat">
					<div class="stat-title">Kamar</div>
					<div class="stat-value">
						<span class="inline-block w-8 skeleton">&nbsp;</span
						><span class="text-base opacity-60">/12</span>
					</div>
					<div class="stat-desc">
						<span class="text-success">⬆</span>
						<span class="inline-block w-6 skeleton">&nbsp;</span> terisi
					</div>
				</div>
				<div class="stat">
					<div class="stat-title">Penghuni</div>
					<div class="stat-value">
						<span class="inline-block w-8 skeleton">&nbsp;</span>
					</div>
					<div class="stat-desc">
						<span class="inline-block w-6 skeleton">&nbsp;</span> akan habis
					</div>
				</div>
				<div class="stat">
					<div class="stat-title">Tagihan</div>
					<div class="stat-value">
						<span class="inline-block w-12 skeleton">&nbsp;</span>
					</div>
					<div class="stat-desc">
						<span class="text-error">⚠</span>
						<span class="inline-block w-6 skeleton">&nbsp;</span> tertunggak
					</div>
				</div>
				<div class="stat">
					<div class="stat-title">Komplain</div>
					<div class="stat-value">
						<span class="inline-block w-6 skeleton">&nbsp;</span>
					</div>
					<div class="stat-desc">
						<span class="text-warning">⚡</span>
						<span class="inline-block w-6 skeleton">&nbsp;</span> perlu ditindak
					</div>
				</div>
			</div>
			<div class="grid grid-cols-1 gap-4 lg:grid-cols-2">
				<div class="card border border-base-300 bg-base-100 shadow-sm">
					<div class="card-body">
						<h2 class="card-title text-base">
							📅 Tagihan Mendekati Jatuh Tempo
						</h2>
						<div class="overflow-x-auto">
							<table class="table table-sm">
								<thead>
									<tr>
										<th>Penghuni</th>
										<th>Kamar</th>
										<th class="text-right">Nominal</th>
										<th>Jatuh Tempo</th>
									</tr>
								</thead>
								<tbody>
									<tr>
										<td>
											<span class="inline-block w-24 skeleton">&nbsp;</span>
										</td>
										<td>
											<span class="inline-block w-8 skeleton">&nbsp;</span>
										</td>
										<td class="text-right">
											<span class="inline-block w-16 skeleton">&nbsp;</span>
										</td>
										<td>
											<span class="inline-block w-20 skeleton">&nbsp;</span>
										</td>
									</tr>
									<tr>
										<td>
											<span class="inline-block w-24 skeleton">&nbsp;</span>
										</td>
										<td>
											<span class="inline-block w-8 skeleton">&nbsp;</span>
										</td>
										<td class="text-right">
											<span class="inline-block w-16 skeleton">&nbsp;</span>
										</td>
										<td>
											<span class="inline-block w-20 skeleton">&nbsp;</span>
										</td>
									</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>
				<div class="card border border-base-300 bg-base-100 shadow-sm">
					<div class="card-body">
						<h2 class="card-title text-base">📋 Komplain Terbaru</h2>
						<div class="space-y-2">
							<div
								class="rounded border border-l-4 border-base-300 border-l-red-500 p-2"
							>
								<p class="text-xs font-bold">
									<span class="inline-block w-32 skeleton">&nbsp;</span>
									<span class="badge badge-soft text-xs badge-error"
										>🔴 Terbuka</span
									>
								</p>
								<p class="mt-1 text-xs">
									<span class="inline-block w-48 skeleton">&nbsp;</span>
								</p>
							</div>
							<div
								class="rounded border border-l-4 border-base-300 border-l-yellow-500 p-2"
							>
								<p class="text-xs font-bold">
									<span class="inline-block w-32 skeleton">&nbsp;</span>
									<span class="badge badge-soft text-xs badge-warning"
										>🟡 Diproses</span
									>
								</p>
								<p class="mt-1 text-xs">
									<span class="inline-block w-48 skeleton">&nbsp;</span>
								</p>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
