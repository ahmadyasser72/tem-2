<!doctype html>
<html lang="id" data-theme="wireframe">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1.0" />
		<title>Wireframe · Login</title>
		<link rel="stylesheet" href="../dist/style.css" />
	</head>
	<body class="flex min-h-dvh items-center justify-center bg-base-200 p-4">
		<div
			class="card w-full max-w-sm border border-base-300 bg-base-100 shadow-sm"
		>
			<div class="card-body p-6 text-center">
				<div class="mx-auto flex size-14 items-center justify-center rounded-full bg-gray-700 text-xl text-white">
					<svg
						xmlns="http://www.w3.org/2000/svg"
						width="24"
						height="24"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="2"
						stroke-linecap="round"
						stroke-linejoin="round"
					>
						<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
						<polyline points="9 22 9 12 15 12 15 22" />
					</svg>
				</div>
				<div class="mt-1 text-lg font-bold tracking-wider uppercase">
					Indekos Ungu
				</div>
				<hr class="my-1 border-base-content/20" />
				<p class="mb-4 text-sm opacity-60">Sistem Manajemen Kos</p>
				<form class="space-y-4">
					<label class="form-control w-full"
						><div class="label"><span class="label-text">Username</span></div>
						<input
							type="text"
							placeholder="Masukkan username"
							class="input w-full input-md"
							disabled
					/></label>
					<label class="form-control w-full"
						><div class="label"><span class="label-text">Password</span></div>
						<input
							type="password"
							placeholder="••••••••"
							class="input w-full input-md"
							disabled
					/></label>
					<button class="btn mt-2 w-full btn-primary" disabled>🔑 Masuk</button>
				</form>
			</div>
		</div>
	</body>
</html>
